# ============================================================
# nginx.ssl.conf — Standalone NGINX (Scenario A: ssl profile)
# ============================================================

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    server_tokens off;

    # ---- Logs ----
    # Alpine NGINX image symlinks these to stdout/stderr → Docker captures them.
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ---- Client Limits ----
    client_max_body_size  25m;   # CSV imports + file uploads
    client_header_timeout 15s;   # Abort stalled header delivery (slow-header mitigation)
    client_body_timeout   30s;
    send_timeout          30s;
    keepalive_timeout     65s;

    # ---- Proxy Timeouts ----
    proxy_connect_timeout 10s;   # Docker-internal: near-instant; 10s covers startup delays
    proxy_send_timeout    60s;
    proxy_read_timeout    120s;  # Slow DB queries, CSV processing

    # ---- Gzip ----
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/xml application/xml+rss
        image/svg+xml font/woff font/woff2;

    # ---- TLS ----
    ssl_protocols       TLSv1.2 TLSv1.3;
    # off: no key rotation in stock NGINX → disabling prevents
    # forward secrecy from being undermined on key exposure
    ssl_session_tickets off;

    # ---- WebSocket / keepalive connection header ----
    # Regular requests:  Connection: ""      → keepalive to upstream
    # WebSocket upgrade: Connection: upgrade → protocol switch
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      "";
    }

    # ---- Upstream ----
    upstream nextjs {
        server nextjs:3000;
        keepalive 32;
    }

    # ---- HTTP → HTTPS Redirect ----
    server {
        listen      80;
        listen      [::]:80;
        server_name {{DOMAIN}} www.{{DOMAIN}};

        # Let's Encrypt HTTP-01 challenge
         location /.well-known/acme-challenge/ {
             root /var/www/certbot;
             try_files $uri $uri/ =404;
         }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS Server ----
    server {
        listen      443 ssl;
        listen      [::]:443 ssl;
        http2       on;
        server_name {{DOMAIN}} www.{{DOMAIN}};

        # /etc/letsencrypt is mounted to /etc/nginx/ssl in docker-compose.prod.yml
        ssl_certificate     /etc/nginx/ssl/live/{{DOMAIN}}/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/{{DOMAIN}}/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # ---- Security Headers ----
        # IMPORTANT: no add_header in any location block below —
        # it would suppress all headers defined here for that location.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"                         always;
        add_header X-Frame-Options           "SAMEORIGIN"                      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ---- Proxy ----
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        # Off: React Server Components stream chunks progressively;
        # buffering would delay first byte to the client.
        proxy_buffering off;

        location / {
            proxy_pass http://nextjs;
        }
    }
}