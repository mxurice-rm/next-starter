# ============================================================
# nginx.internal.conf — App-internal NGINX (Scenario B: internal profile)
# Listens on host port 5001 (→ container port 80).
# Receives HTTP from the central reverse proxy.
#
# Does NOT set security headers  → central proxy's job
# Does NOT redirect HTTP→HTTPS   → would cause a redirect loop
# Does NOT compress               → central proxy compresses for the client
# ============================================================

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    server_tokens off;

    # ---- Logs ----
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ---- Client Limits ----
    client_max_body_size  25m;   # Must match central proxy so uploads aren't rejected here
    client_header_timeout 15s;
    client_body_timeout   30s;
    send_timeout          30s;
    keepalive_timeout     65s;

    # ---- Proxy Timeouts ----
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    120s;

    # ---- WebSocket / keepalive connection header ----
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      "";
    }

    # ---- Upstream ----
    upstream nextjs {
        server nextjs:3000;
        keepalive 32;
    }

    # ---- HTTP Server (no SSL — terminated at the central proxy) ----
    server {
        listen      80;
        listen      [::]:80;
        server_name _;   # Domain filtering is enforced by the central proxy

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;

        # Not internet-facing → trusting central proxy's forwarding headers is safe.
        proxy_set_header X-Real-IP         $http_x_real_ip;
        proxy_set_header X-Forwarded-For   $http_x_forwarded_for;    # Pass through, don't re-append
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;  # Must stay "https"
        proxy_set_header X-Forwarded-Host  $http_x_forwarded_host;

        proxy_buffering off;

        location / {
            proxy_pass http://nextjs;
        }
    }
}