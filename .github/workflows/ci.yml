name: Code analysis

on:
  push:
    branches-ignore: [main]
    paths: &paths
      - 'src/**'
      - '*.ts'
      - '*.tsx'
      - '*.js'
      - '*.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    paths: *paths

jobs:
  code-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/code-analysis
