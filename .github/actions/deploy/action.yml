name: Deploy to server
description: Copy files and deploy via SSH to production server

inputs:
  ssh-host:
    description: 'SSH host'
    required: true
  ssh-user:
    description: 'SSH username'
    required: true
  ssh-key:
    description: 'SSH private key'
    required: true
  deploy-path:
    description: 'Deployment directory on the server'
    required: true
  profile:
    description: 'NGINX profile (internal or ssl)'
    required: true
  image:
    description: 'Docker image URL with tag'
    required: true
  ghcr-token:
    description: 'GitHub token for GHCR authentication on server'
    required: true
  ghcr-user:
    description: 'GitHub username for GHCR authentication on server'
    required: true

runs:
  using: composite

  steps:
    - name: Setup SSH
      shell: bash
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ inputs.ssh-key }}" | tr -d '\r' > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ inputs.ssh-host }} >> ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts

    - name: Copy files to server
      shell: bash
      run: |
        rsync -avzR \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
          docker-compose.prod.yml nginx scripts/deploy.sh \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }}:${{ inputs.deploy-path }}/

    - name: Deploy on server
      shell: bash
      run: |
        ssh -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=yes \
          ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
          'echo "${{ inputs.ghcr-token }}" | docker login ghcr.io -u "${{ inputs.ghcr-user }}" --password-stdin && \
           cd "${{ inputs.deploy-path }}" && \
           chmod +x scripts/deploy.sh && \
           bash scripts/deploy.sh --remote --profile "${{ inputs.profile }}" --image "${{ inputs.image }}"'

    - name: Cleanup SSH key
      if: always()
      shell: bash
      run: rm -f ~/.ssh/deploy_key