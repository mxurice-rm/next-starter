name: Docker build and push
description: Build Docker image and push to GitHub Container Registry

inputs:
  image-name:
    description: 'Full image name (e.g. ghcr.io/user/repo)'
    required: true
  github-token:
    description: 'GitHub token for GHCR authentication'
    required: true
  build-args:
    description: 'Build arguments to pass to Docker build'
    required: false

runs:
  using: composite

  steps:
    - uses: docker/setup-buildx-action@v3

    - name: Extract registry from image name
      id: registry
      run: echo "url=$(echo '${{ inputs.image-name }}' | cut -d/ -f1)" >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Log in to container registry
      uses: docker/login-action@v3
      with:
        registry: ${{ steps.registry.outputs.url }}
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.image-name }}
        tags: |
          type=ref,event=branch
          type=sha
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: next.Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: ${{ inputs.build-args }}